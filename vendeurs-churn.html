<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auctelia — Enquête vendeurs (relance)</title>
<meta name="description" content="Enquête vendeurs Auctelia — 2 minutes, pour comprendre pourquoi vous n'avez plus vendu récemment.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="styles/main.css">
</head>
<body>
<div class="au-page">

  <div class="au-topbar">
    <a class="au-logo" href="#"><span>Auctelia</span><span class="dot">.</span></a>
    <div class="au-lang-switch" role="group" aria-label="Langue / Taal">
      <button type="button" data-lang="fr" class="active">FR</button>
      <button type="button" data-lang="nl">NL</button>
    </div>
  </div>

  <div class="au-progress-wrap">
    <div class="au-progress-label"><span id="progress-text">1 / 8</span></div>
    <div class="au-progress-track"><div class="au-progress-fill" id="progress-fill" style="width:12.5%"></div></div>
  </div>

  <main class="au-form-main">
    <div class="au-container">
      <form id="survey-form" novalidate>
        <div class="au-stepper" id="stepper"></div>
      </form>
    </div>
  </main>

  <div class="au-footer">Clictelia SA · Auctelia — <span id="footer-privacy">Vos réponses restent confidentielles</span></div>
</div>

<script>
(function () {
  "use strict";

  var I18N = {
    fr: {
      footerPrivacy: "Vos réponses restent confidentielles",
      optional: "(optionnel)",
      next: "Suivant",
      back: "Retour",
      submit: "Envoyer",
      submitting: "Envoi en cours…",
      npsLow: "0 = Pas du tout probable",
      npsHigh: "10 = Extrêmement probable",
      charLimit: "caractères",
      errorRequired: "Merci de répondre pour continuer.",
      autreLabel: "Précisez :",
      autrePlaceholder: "En quelques mots…",
      q: [
        {
          eyebrow: "Pour commencer",
          title: "Avant d'arrêter, quelle était votre activité de vente sur Auctelia ?",
          type: "radio",
          options: [
            { value: "plusieurs", title: "Plusieurs ventes régulières" },
            { value: "occasionnelle", title: "Une vente occasionnelle" },
            { value: "une_seule", title: "Une seule vente au total" }
          ]
        },
        {
          eyebrow: "Recommandation",
          title: "Sur une échelle de 0 à 10, quelle est la probabilité que vous recommandiez Auctelia à un proche souhaitant vendre du matériel industriel ?",
          type: "nps"
        },
        {
          eyebrow: "Raison de l'arrêt",
          title: "Qu'est-ce qui explique le mieux votre arrêt ?",
          help: "Plusieurs réponses possibles.",
          type: "checkbox",
          shuffle: true,
          anchors: ["aucune_raison", "autre"],
          autreReveal: true,
          options: [
            { value: "prix_decevant", label: "Prix de vente final trop souvent décevant" },
            { value: "reserve_non_atteinte", label: "Prix de réserve trop souvent non atteint" },
            { value: "suivi_insatisfaisant", label: "Suivi insatisfaisant" },
            { value: "qualite_interactions", label: "Qualité insuffisante des échanges avec le service client Auctelia" },
            { value: "mise_en_vente_compliquee", label: "Mise en vente trop compliquée (logistique, photos)" },
            { value: "alternative_trouvee", label: "Alternative trouvée (autre plateforme, vente directe)" },
            { value: "plus_de_materiel", label: "Plus de matériel industriel à vendre actuellement" },
            { value: "aucune_raison", label: "Aucune raison particulière" },
            { value: "autre", label: "Autre" }
          ]
        },
        {
          eyebrow: "Prix de réserve",
          title: "Aviez-vous mis un prix de réserve sur vos ventes ?",
          type: "radio",
          options: [
            { value: "oui", title: "Oui" },
            { value: "non", title: "Non" }
          ]
        },
        {
          eyebrow: "Prix de réserve",
          title: "Repensez à vos ventes : à quelle fréquence le prix de réserve n'a-t-il pas été atteint ?",
          type: "radio",
          skipIf: function (a) { return a.a_mis_reserve === "non"; },
          options: [
            { value: "jamais", title: "Jamais" },
            { value: "parfois", title: "Parfois" },
            { value: "souvent", title: "Souvent" },
            { value: "ne_sait_pas", title: "Je ne sais pas" }

            { value: "recommandation", title: "Sur recommandation de mon interlocuteur Auctelia" },

            { value: "ne_sait_pas", title: "Je ne sais pas" }

          eyebrow: "Retour possible",
          title: "Qu'est-ce qui vous ferait remettre du matériel industriel en vente ?",
          type: "checkbox",

          anchors: ["pas_de_retour", "autre"],
          autreReveal: true,
          options: [
            { value: "reserve_realiste", label: "Prix de réserve plus réalistes" },
            { value: "meilleur_accompagnement", label: "Meilleur accompagnement" },
            { value: "processus_simple", label: "Processus plus simple" },
            { value: "plus_de_visibilite", label: "Plus de visibilité sur mes lots" },
            { value: "pas_de_retour", label: "Rien, je ne prévois pas de revendre" },
            { value: "autre", label: "Autre" }
          ]
        },
        {
          eyebrow: "Votre mot",
          title: "Autre chose à ajouter, sur cette expérience ou sur Auctelia en général ?",
          type: "textarea",
          optional: true,
          placeholder: "Ce champ est libre — dites-nous ce qui vous semble important, même si ça sort du cadre des questions précédentes…"
        }
      ]
    },
    nl: {
      footerPrivacy: "Uw antwoorden blijven vertrouwelijk",
      optional: "(optioneel)",
      next: "Volgende",
      back: "Terug",
      submit: "Verzenden",
      submitting: "Bezig met verzenden…",
      npsLow: "0 = Helemaal niet waarschijnlijk",
      npsHigh: "10 = Uiterst waarschijnlijk",
      charLimit: "tekens",
      errorRequired: "Gelieve te antwoorden om verder te gaan.",
      autreLabel: "Verduidelijk:",
      autrePlaceholder: "In een paar woorden…",
      q: [
        {
          eyebrow: "Om te beginnen",
          title: "Voordat u stopte, wat was uw verkoopactiviteit op Auctelia?",
          type: "radio",
          options: [
            { value: "plusieurs", title: "Meerdere regelmatige verkopen" },
            { value: "occasionnelle", title: "Een occasionele verkoop" },
            { value: "une_seule", title: "Slechts één verkoop in totaal" }
          ]
        },
        {
          eyebrow: "Aanbeveling",
          title: "Op een schaal van 0 tot 10, hoe waarschijnlijk is het dat u Auctelia zou aanbevelen aan een kennis die industrieel materiaal wil verkopen?",
          type: "nps"
        },
        {
          eyebrow: "Reden van stoppen",
          title: "Wat verklaart het best waarom u gestopt bent?",
          help: "Meerdere antwoorden mogelijk.",
          type: "checkbox",
          shuffle: true,
          anchors: ["aucune_raison", "autre"],
          autreReveal: true,
          options: [
            { value: "prix_decevant", label: "Uiteindelijke verkoopprijs te vaak teleurstellend" },

            { value: "suivi_insatisfaisant", label: "Onvoldoende opvolging" },

            { value: "alternative_trouvee", label: "Alternatief gevonden (ander platform, directe verkoop)" },

            { value: "aucune_raison", label: "Geen specifieke reden" },
            { value: "autre", label: "Andere" }
          ]

        {
          eyebrow: "Reserveprijs",
          title: "Had u een reserveprijs ingesteld op uw verkopen?",
          type: "radio",
          options: [
            { value: "oui", title: "Ja" },
            { value: "non", title: "Nee" }
          ]
        },
        {
          eyebrow: "Reserveprijs",
          title: "Denk terug aan uw verkopen: hoe vaak werd de reserveprijs niet bereikt?",
          type: "radio",
          skipIf: function (a) { return a.a_mis_reserve === "non"; },
          options: [
            { value: "jamais", title: "Nooit" },
            { value: "parfois", title: "Soms" },
            { value: "souvent", title: "Vaak" },
            { value: "ne_sait_pas", title: "Ik weet het niet" }
          ]
        },
        {
          eyebrow: "Oorsprong van de prijs",
          title: "Hoe werd de reserveprijs voor deze loten bepaald?",
          type: "radio",
          skipIf: function (a) { return a.a_mis_reserve === "non"; },
          options: [
            { value: "vendeur", title: "Ik heb ze zelf bepaald volgens mijn verwachtingen" },
            { value: "recommandation", title: "Op aanbeveling van mijn Auctelia-contactpersoon" },
            { value: "ca_depend", title: "Dat verschilt per lot" },
            { value: "ne_sait_pas", title: "Ik weet het niet" }
          ]
        },
        {
          eyebrow: "Mogelijke terugkeer",
          title: "Wat zou u ertoe brengen om opnieuw industrieel materiaal te koop te zetten?",
          type: "checkbox",
          shuffle: true,
          anchors: ["pas_de_retour", "autre"],
          autreReveal: true,
          options: [
            { value: "reserve_realiste", label: "Realistischere reserveprijzen" },
            { value: "meilleur_accompagnement", label: "Betere begeleiding" },
            { value: "processus_simple", label: "Eenvoudiger proces" },
            { value: "plus_de_visibilite", label: "Meer zichtbaarheid voor mijn loten" },
            { value: "pas_de_retour", label: "Niets, ik plan niet opnieuw te verkopen" },
            { value: "autre", label: "Andere" }
          ]
        },
        {
          eyebrow: "Uw woord",
          title: "Nog iets toe te voegen, over deze ervaring of over Auctelia in het algemeen?",
          type: "textarea",
          optional: true,
          placeholder: "Dit veld is vrij — laat ons weten wat u belangrijk vindt, ook buiten de vorige vragen…"
        }
      ]
    }
  };

  var FIELD_NAMES = ["segment", "nps", "raisons_arret", "a_mis_reserve", "freq_reserve_non_atteinte", "origine_prix_reserve", "leviers_retour", "verbatim"];

  window.AU_SURVEY_CONFIG = {
    i18n: I18N,
    fieldNames: FIELD_NAMES,
    surveyType: "vendeurs",
    audience: "churn",
    thanksUrl: "merci.html"
  };
})();
</script>
<script src="assets/survey-engine.js"></script>
</body>
</html>
