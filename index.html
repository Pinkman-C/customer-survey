<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auctelia — Enquête de satisfaction</title>
<link rel="stylesheet" href="styles/main.css">
</head>
<body>
<div class="au-page">
  <div class="au-topbar">
    <a class="au-logo" href="#"><span>Auctelia</span><span class="dot">.</span></a>
  </div>
  <main class="au-thanks" id="fallback-view" style="display:none;">
    <h1>Enquêtes de satisfaction Auctelia</h1>
    <p style="margin-bottom:28px;">Choisissez l'enquête qui vous concerne, ou utilisez le lien reçu par email pour accéder directement à la bonne langue.</p>
    <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
      <a class="au-btn au-btn-primary" style="margin-left:0; text-decoration:none; display:inline-flex; align-items:center;" href="vendeurs.html">Enquête vendeurs</a>
      <a class="au-btn au-btn-gold" style="text-decoration:none; display:inline-flex; align-items:center;" href="acheteurs.html">Enquête acheteurs</a>
    </div>
  </main>
</div>
<script>
(function () {
  "use strict";
  var params = new URLSearchParams(window.location.search);
  var type = (params.get("type") || "").toLowerCase();
  var target = null;

  if (type === "vendeurs" || type === "vendeur" || type === "seller" || type === "sellers") {
    target = "vendeurs.html";
  } else if (type === "acheteurs" || type === "acheteur" || type === "buyer" || type === "buyers") {
    target = "acheteurs.html";
  }

  if (target) {
    // Preserve all other query params (lang, utm_source, etc.)
    params.delete("type");
    var qs = params.toString();
    window.location.replace(target + (qs ? "?" + qs : ""));
  } else {
    document.getElementById("fallback-view").style.display = "flex";
  }
})();
</script>
</body>
</html>
